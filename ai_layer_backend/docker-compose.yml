version: '3.8'
services:
  ai-api:
    platform: linux/amd64
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    # API handles requests and adds jobs to Redis
    depends_on:
      - redis

  ai-worker:
    platform: linux/amd64
    build: .
    # Use the same image but change the command to run Celery worker
    command: celery -A app.workers.celery_app worker --loglevel=info --pool=solo
    env_file:
      - .env
    # Worker pulls jobs from Redis
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  redis-data:
