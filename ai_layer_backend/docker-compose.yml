services:
  ai-api:
    platform: linux/amd64
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # API handles requests and adds jobs to Redis
    depends_on:
      redis:
        condition: service_healthy

  ai-worker:
    platform: linux/amd64
    build: .
    # Use the same image but change the command to run Celery worker
    command: celery -A app.workers.celery_app worker --loglevel=info --pool=prefork --concurrency=1 --prefetch-multiplier=1 --max-tasks-per-child=4 --max-memory-per-child=1200000
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Worker pulls jobs from Redis
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  redis-data:
