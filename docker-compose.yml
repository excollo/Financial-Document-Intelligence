version: '3.8'

services:
  # 1. Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api
    depends_on:
      - node-backend

  # 2. Node.js Backend Service
  node-backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: node-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/financial_db
      - AI_SERVICE_URL=http://ai-backend:8000
    depends_on:
      - mongo
      - redis

  # 3. AI Python Platform Service
  ai-backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: ai-backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/financial_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - mongo
      - redis

  # Infrastructure Services
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  mongodb_data:
