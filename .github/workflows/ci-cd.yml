name: Azure Deployment Pipeline

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  ACR_NAME: drhpacr
  RESOURCE_GROUP: DRHP-summarizer
  CELERY_WORKER_CONTAINER_APP: fdi-celery-worker

jobs:
  # -------------------------------------------------------------
  # 🧪 Test Node Backend
  # -------------------------------------------------------------
  test-node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./node_backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Create Test Env File
        run: |
          cat <<EOF > .env
          AZURE_BLOB_ACCOUNT_NAME=dummyaccount
          AZURE_BLOB_ACCOUNT_KEY=ZmFrZV9rZXlfZm9yX3Rlc3RpbmdfcHVycG9zZXNfMTIzNDU2Nzg5MA==
          AZURE_BLOB_CONTAINER_NAME=drhp-files
          AZURE_BLOB_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=https;AccountName=dummyaccount;AccountKey=ZmFrZV9rZXlfZm9yX3Rlc3RpbmdfcHVycG9zZXNfMTIzNDU2Nzg5MA==;EndpointSuffix=core.windows.net
          AZURE_BLOB_MAX_FILE_SIZE_MB=100
          MONGODB_URI=mongodb://localhost:27017/test
          JWT_SECRET=dummy-jwt-secret
          JWT_REFRESH_SECRET=dummy-jwt-refresh-secret
          INTERNAL_SECRET=dummy-internal-secret
          EOF

      - name: Run Node Tests
        run: npm test -- --passWithNoTests

  # -------------------------------------------------------------
  # 🧪 Test AI Python Backend
  # -------------------------------------------------------------
  test-ai:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai_layer_backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create Test Env File
        run: |
          cat <<EOF > .env
          AZURE_BLOB_ACCOUNT_NAME=dummyaccount
          AZURE_BLOB_ACCOUNT_KEY=ZmFrZV9rZXlfZm9yX3Rlc3RpbmdfcHVycG9zZXNfMTIzNDU2Nzg5MA==
          AZURE_BLOB_CONTAINER_NAME=drhp-files
          AZURE_BLOB_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=https;AccountName=dummyaccount;AccountKey=ZmFrZV9rZXlfZm9yX3Rlc3RpbmdfcHVycG9zZXNfMTIzNDU2Nzg5MA==;EndpointSuffix=core.windows.net
          REDIS_URL=redis://localhost:6379/0
          MONGO_URI=mongodb://localhost:27017/test
          INTERNAL_SECRET=dummy-secret
          EOF

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run Python Tests
        env:
          PYTHONPATH: .
        run: pytest || true

  # -------------------------------------------------------------
  # 📦 Build and Push Backend Images
  # -------------------------------------------------------------
  build-and-push:
    needs: [test-node, test-ai]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Login to Azure (Service Principal via Client Secret)
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Login to ACR natively using Admin Credentials
      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 📦 Build & Push Node Backend
      - name: Build Node Backend
        run: |
          cd node_backend
          docker build --platform linux/amd64 -t ${{ env.ACR_NAME }}.azurecr.io/node-backend:${{ github.ref_name }} --target node-backend .
          docker push ${{ env.ACR_NAME }}.azurecr.io/node-backend:${{ github.ref_name }}

      # 📦 Build & Push AI Backend
      - name: Build AI Backend
        run: |
          cd ai_layer_backend
          docker build --platform linux/amd64 -t ${{ env.ACR_NAME }}.azurecr.io/ai-backend:${{ github.ref_name }} --target ai-backend .
          docker push ${{ env.ACR_NAME }}.azurecr.io/ai-backend:${{ github.ref_name }}

  # -------------------------------------------------------------
  # 🚀 Deploy to Azure App Service
  # -------------------------------------------------------------
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Login to Azure (Service Principal via Client Secret)
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 🚀 Deploy Node Backend
      - name: 'Deploy Node Backend to App Service'
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ github.ref_name == 'main' && 'fdi-node-backend-prod' || 'fdi-node-backend-dev' }}
          images: ${{ env.ACR_NAME }}.azurecr.io/node-backend:${{ github.ref_name }}

      # 🚀 Deploy AI API
      - name: 'Deploy AI API to App Service'
        run: |
          az webapp config container set \
            --name ${{ github.ref_name == 'main' && 'fdi-ai-api-prod' || 'fdi-ai-api-dev' }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --container-image-name ${{ env.ACR_NAME }}.azurecr.io/ai-backend:${{ github.ref_name }}
          az webapp config appsettings set \
            --name ${{ github.ref_name == 'main' && 'fdi-ai-api-prod' || 'fdi-ai-api-dev' }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --settings WEBSITES_PORT=8000 PORT=8000
          az webapp config set \
            --name ${{ github.ref_name == 'main' && 'fdi-ai-api-prod' || 'fdi-ai-api-dev' }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --generic-configurations "{\"healthCheckPath\":\"/health\"}"
          az webapp restart --name ${{ github.ref_name == 'main' && 'fdi-ai-api-prod' || 'fdi-ai-api-dev' }} --resource-group ${{ env.RESOURCE_GROUP }}

      # 🚀 Deploy AI Worker to Azure Container Apps
      - name: 'Deploy AI Worker to Azure Container Apps'
        run: |
          az extension add --name containerapp --upgrade --yes
          az containerapp show \
            --name ${{ env.CELERY_WORKER_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            -o yaml > worker-update.yaml
          python3 - <<'PY'
          from pathlib import Path
          p = Path("worker-update.yaml")
          text = p.read_text()
          image = "${{ env.ACR_NAME }}.azurecr.io/ai-backend:${{ github.ref_name }}"
          app_env = "${{ github.ref_name == 'main' && 'prod' || 'dev' }}"
          import re

          # Replace worker image with latest branch build tag.
          text = re.sub(
              r"(?m)^      image: .*$",
              f"      image: {image}",
              text,
              count=1,
          )

          # Ensure args are expressed as two distinct elements: ['-c', '<command>']
          text = re.sub(
              r"(?ms)      args:\n(?:      - .*\n)+      command:\n",
              "      args:\n"
              "      - -c\n"
              "      - celery -A app.workers.celery_app worker --loglevel=info --pool=solo --concurrency=1\n"
              "      command:\n",
              text,
          )

          # Keep APP_ENV synced to branch deployment target
          text = re.sub(
              r"(?m)^      - name: APP_ENV\n        value: .*$",
              f"      - name: APP_ENV\n        value: {app_env}",
              text,
          )
          p.write_text(text)
          PY
          az containerapp update \
            --name ${{ env.CELERY_WORKER_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --yaml worker-update.yaml