name: Azure Deployment Pipeline

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  ACR_NAME: drhpacr
  RESOURCE_GROUP: DRHP-summarizer

jobs:
  # -------------------------------------------------------------
  # Build and Push Backend Images
  # -------------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Login to Azure
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Login to ACR
      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      # 📦 Build & Push Node Backend
      - name: Build Node Backend
        run: |
          cd node_backend
          docker build --platform linux/amd64 -t ${{ env.ACR_NAME }}.azurecr.io/node-backend:${{ github.ref_name }} --target node-backend .
          docker push ${{ env.ACR_NAME }}.azurecr.io/node-backend:${{ github.ref_name }}

      # 📦 Build & Push AI Backend
      - name: Build AI Backend
        run: |
          cd ai_layer_backend
          docker build --platform linux/amd64 -t ${{ env.ACR_NAME }}.azurecr.io/ai-backend:${{ github.ref_name }} --target ai-backend .
          docker push ${{ env.ACR_NAME }}.azurecr.io/ai-backend:${{ github.ref_name }}

  # -------------------------------------------------------------
  # Deploy to Azure Container Apps
  # -------------------------------------------------------------
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 🚀 Deploy Node Backend (Logic for main vs develop)
      - name: Deploy Node Backend
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ github.ref_name == 'main' && 'aca-node-backend-prod' || 'aca-node-backend-dev' }}
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/node-backend:${{ github.ref_name }}

      # 🚀 Deploy AI Backend
      - name: Deploy AI Backend
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ github.ref_name == 'main' && 'aca-ai-api-prod' || 'aca-ai-api-dev' }}
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/ai-backend:${{ github.ref_name }}

      # 🚀 Deploy AI Worker
      - name: Deploy AI Worker
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ github.ref_name == 'main' && 'aca-ai-worker-prod' || 'aca-ai-worker-dev' }}
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/ai-backend:${{ github.ref_name }}
