name: Azure Deployment Pipeline

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  ACR_NAME: drhpacr
  RESOURCE_GROUP: DRHP-summarizer

jobs:
  # -------------------------------------------------------------
  # 🧪 Test Node Backend
  # -------------------------------------------------------------
  test-node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./node_backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Create Test Env File
        run: |
          cat <<EOF > .env
          R2-ACCESS-KEY-ID=dummy-access-key
          R2-SECRET-ACCESS-KEY=dummy-secret-key
          R2-BUCKET-NAME=dummy-bucket
          CLOUDFLARE-URI=https://dummy.cloudflarestorage.com
          MONGODB-URI=mongodb://localhost:27017/test
          JWT-SECRET=dummy-jwt-secret
          JWT-REFRESH-SECRET=dummy-jwt-refresh-secret
          EOF

      - name: Run Node Tests
        run: npm test -- --passWithNoTests

  # -------------------------------------------------------------
  # 🧪 Test AI Python Backend
  # -------------------------------------------------------------
  test-ai:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai_layer_backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run Python Tests
        env:
          PYTHONPATH: .
        run: pytest || true

  # -------------------------------------------------------------
  # 📦 Build and Push Backend Images
  # -------------------------------------------------------------
  build-and-push:
    needs: [test-node, test-ai]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Login to Azure using OIDC
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B953055700A1448D828BDD500A13D066 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_038C3B5AD8C34641A8B618343B76608F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_0B47EF5A196D4AA59065B1555D1BE5ED }}

      # Login to ACR natively using Admin Credentials
      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 📦 Build & Push Node Backend
      - name: Build Node Backend
        run: |
          cd node_backend
          docker build --platform linux/amd64 -t ${{ env.ACR_NAME }}.azurecr.io/node-backend:${{ github.ref_name }} --target node-backend .
          docker push ${{ env.ACR_NAME }}.azurecr.io/node-backend:${{ github.ref_name }}

      # 📦 Build & Push AI Backend
      - name: Build AI Backend
        run: |
          cd ai_layer_backend
          docker build --platform linux/amd64 -t ${{ env.ACR_NAME }}.azurecr.io/ai-backend:${{ github.ref_name }} --target ai-backend .
          docker push ${{ env.ACR_NAME }}.azurecr.io/ai-backend:${{ github.ref_name }}

  # -------------------------------------------------------------
  # 🚀 Deploy to Azure App Service
  # -------------------------------------------------------------
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Login to Azure using OIDC
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B953055700A1448D828BDD500A13D066 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_038C3B5AD8C34641A8B618343B76608F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_0B47EF5A196D4AA59065B1555D1BE5ED }}

      # 🚀 Deploy Node Backend
      - name: 'Deploy Node Backend to App Service'
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ github.ref_name == 'main' && 'fdi-node-backend-prod' || 'fdi-node-backend-dev' }}
          images: ${{ env.ACR_NAME }}.azurecr.io/node-backend:${{ github.ref_name }}

      # 🚀 Deploy AI API
      - name: 'Deploy AI API to App Service'
        run: |
          az webapp config container set \
            --name ${{ github.ref_name == 'main' && 'fdi-ai-api-prod' || 'fdi-ai-api-dev' }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ env.ACR_NAME }}.azurecr.io/ai-backend:${{ github.ref_name }}
          az webapp restart --name ${{ github.ref_name == 'main' && 'fdi-ai-api-prod' || 'fdi-ai-api-dev' }} --resource-group ${{ env.RESOURCE_GROUP }}

      # 🚀 Deploy AI Worker
      - name: 'Deploy AI Worker to App Service'
        run: |
          az webapp config container set \
            --name ${{ github.ref_name == 'main' && 'fdi-ai-worker-prod' || 'fdi-ai-worker-dev' }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ env.ACR_NAME }}.azurecr.io/ai-backend:${{ github.ref_name }}
          az webapp restart --name ${{ github.ref_name == 'main' && 'fdi-ai-worker-prod' || 'fdi-ai-worker-dev' }} --resource-group ${{ env.RESOURCE_GROUP }}
