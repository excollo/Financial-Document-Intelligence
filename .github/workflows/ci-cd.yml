name: Azure Deployment Pipeline

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  ACR_NAME: drhpacr
  RESOURCE_GROUP: DRHP-summarizer

jobs:
  # -------------------------------------------------------------
  # 🧪 Test Node Backend
  # -------------------------------------------------------------
  test-node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./node_backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Create Test Env File
        run: |
          cat <<EOF > .env
          R2-ACCESS-KEY-ID=dummy-access-key
          R2-SECRET-ACCESS-KEY=dummy-secret-key
          R2-BUCKET-NAME=dummy-bucket
          CLOUDFLARE-URI=https://dummy.cloudflarestorage.com
          MONGODB-URI=mongodb://localhost:27017/test
          JWT-SECRET=dummy-jwt-secret
          JWT-REFRESH-SECRET=dummy-jwt-refresh-secret
          EOF

      - name: Run Node Tests
        run: npm test -- --passWithNoTests

  # -------------------------------------------------------------
  # 🧪 Test AI Python Backend
  # -------------------------------------------------------------
  test-ai:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai_layer_backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run Python Tests
        env:
          PYTHONPATH: .
        run: pytest || true

  # -------------------------------------------------------------
  # 📦 Build and Push Backend Images
  # -------------------------------------------------------------
  build-and-push:
    needs: [test-node, test-ai]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Login to Azure
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          allow-no-subscriptions: true

      # Login to ACR natively using Admin Credentials
      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 📦 Build & Push Node Backend
      - name: Build Node Backend
        run: |
          cd node_backend
          docker build --platform linux/amd64 -t ${{ env.ACR_NAME }}.azurecr.io/node-backend:${{ github.ref_name }} --target node-backend .
          docker push ${{ env.ACR_NAME }}.azurecr.io/node-backend:${{ github.ref_name }}

      # 📦 Build & Push AI Backend
      - name: Build AI Backend
        run: |
          cd ai_layer_backend
          docker build --platform linux/amd64 -t ${{ env.ACR_NAME }}.azurecr.io/ai-backend:${{ github.ref_name }} --target ai-backend .
          docker push ${{ env.ACR_NAME }}.azurecr.io/ai-backend:${{ github.ref_name }}

  # -------------------------------------------------------------
  # 🚀 Deploy to Azure Container Apps
  # -------------------------------------------------------------
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          allow-no-subscriptions: true

      - name: Install Azure Container Apps Extension
        run: |
          az extension add --name containerapp --upgrade
          az config set core.no_registration=true



      # 🚀 Deploy Node Backend
      - name: Deploy Node Backend
        run: |
          az containerapp update \
            --ids "/subscriptions/f3ac2634-4e07-4d24-adc5-3e607e4bd177/resourceGroups/DRHP-summarizer/providers/Microsoft.App/containerApps/${{ github.ref_name == 'main' && 'aca-node-backend-prod' || 'aca-node-backend-dev' }}" \
            --image ${{ env.ACR_NAME }}.azurecr.io/node-backend:${{ github.ref_name }}

      # 🚀 Deploy AI Backend
      - name: Deploy AI Backend
        run: |
          az containerapp update \
            --ids "/subscriptions/f3ac2634-4e07-4d24-adc5-3e607e4bd177/resourceGroups/DRHP-summarizer/providers/Microsoft.App/containerApps/${{ github.ref_name == 'main' && 'aca-ai-api-prod' || 'aca-ai-api-dev' }}" \
            --image ${{ env.ACR_NAME }}.azurecr.io/ai-backend:${{ github.ref_name }}

      # 🚀 Deploy AI Worker
      - name: Deploy AI Worker
        run: |
          az containerapp update \
            --ids "/subscriptions/f3ac2634-4e07-4d24-adc5-3e607e4bd177/resourceGroups/DRHP-summarizer/providers/Microsoft.App/containerApps/${{ github.ref_name == 'main' && 'aca-ai-worker-prod' || 'aca-ai-worker-dev' }}" \
            --image ${{ env.ACR_NAME }}.azurecr.io/ai-backend:${{ github.ref_name }}
